apiVersion: v1
kind: Pod
metadata:
  name: find-exam-link-pod
  namespace: vot
  labels:
    app: find-exam-link
spec:
  containers:
  - name: find-exam-link-container
    image: dhdimitrov/find-exam-link:amd
    imagePullPolicy: Always
    env:
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
  restartPolicy: Never